<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로컬 지식 봇 (Local-First RAG)</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1A73E8',
                        background: '#F8F9FA',
                        surface: '#FFFFFF',
                        text: '#202124'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-text font-sans h-screen flex overflow-hidden">
    
    <!-- Sidebar (25%) -->
    <aside class="w-80 bg-surface border-r border-gray-200 flex flex-col h-full shadow-sm shrink-0 hidden md:flex">
        <div class="p-6 border-b border-gray-200 flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-bold text-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                </svg>
            </div>
            <h1 class="text-xl font-bold text-gray-800 tracking-tight">로컬 지식 봇</h1>
        </div>
        
        <div class="p-4 flex-1 overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider">학습된 문서 목록</h2>
                <button id="refresh-docs-btn" class="text-primary hover:bg-blue-50 p-1.5 rounded-md transition-colors" title="문서 인덱싱 시작">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>
            <ul id="doc-list" class="space-y-2">
                <li class="text-sm text-gray-500 italic py-2 px-2">문서를 읽어오는 중...</li>
            </ul>
        </div>

        <div class="p-4 border-t border-gray-200 bg-gray-50">
            <div id="system-status" class="mb-3 text-xs text-gray-600 space-y-1">
                <div>상태를 확인하는 중...</div>
            </div>
            <div class="flex items-center justify-center gap-2 text-sm text-green-700 font-medium bg-green-100 p-3 rounded-lg border border-green-200">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                Local Mode Only
            </div>
        </div>
    </aside>

    <!-- Main Chat Area (75%) -->
    <main class="flex-1 flex flex-col h-full bg-background relative">
        <header class="md:hidden border-b border-gray-200 bg-surface p-4 flex items-center gap-3">
             <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-bold text-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                </svg>
            </div>
            <h1 class="text-lg font-bold text-gray-800 tracking-tight">로컬 지식 봇</h1>
        </header>

        <!-- Chat History -->
        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 pb-32">
            <!-- 초기 환영 메시지 -->
            <div class="flex flex-col gap-1 items-start max-w-3xl">
                <div class="bg-surface border border-gray-200 text-text p-4 rounded-2xl rounded-tl-sm shadow-sm text-[15px]">
                    <p>안녕하세요! 사내 규정 및 문서에 대해 봇에게 물어보세요.<br><span class="text-gray-500 text-sm mt-1 inline-block">※ 외부 통신 없이 로컬 문서를 기반으로 안전하게 답변합니다.</span></p>
                </div>
            </div>
        </div>

        <!-- Input Area (Floating) -->
        <div class="absolute bottom-0 left-0 right-0 p-4 md:p-6 bg-gradient-to-t from-background via-background to-transparent">
            <div class="max-w-4xl mx-auto">
                <div class="bg-surface rounded-2xl shadow-lg border border-gray-200 p-2 pl-4 flex items-end gap-2 focus-within:ring-2 focus-within:ring-primary/50 transition-all">
                    <textarea id="message-input" rows="1" class="flex-1 max-h-32 min-h-[44px] bg-transparent resize-none outline-none py-3 text-[15px] text-text placeholder-gray-400" placeholder="무엇이든 물어보세요 (예: 경조사 휴가 며칠인가요?)"></textarea>
                    <button id="send-btn" class="bg-primary hover:bg-blue-600 text-white rounded-xl p-3 h-[44px] w-[44px] flex items-center justify-center transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-1" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                        </svg>
                    </button>
                    <!-- 업로드 버튼 (테스트 편의용) -->
                    <button class="hidden" id="file-upload-proxy"></button>
                </div>
                <div class="text-center mt-2 text-xs text-gray-400 font-medium">
                    AI generated content may be inaccurate. Local First RAG PoC.
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-4 right-4 bg-gray-800 text-white px-4 py-3 rounded-lg shadow-xl opacity-0 transition-opacity duration-300 pointer-events-none z-50 flex items-center gap-2">
        <span id="toast-icon">ℹ️</span>
        <span id="toast-message">알림</span>
    </div>

    <!-- 로딩 오버레이 (인덱싱 시) -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-blue-200 border-t-primary rounded-full animate-spin"></div>
        <h3 class="mt-4 text-lg font-bold text-gray-800">문서를 학습하고 있습니다</h3>
        <p class="text-sm text-gray-500 mt-2">문서 크기에 따라 다소 시간이 소요될 수 있습니다.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
